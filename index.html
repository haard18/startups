<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian Tech Startups | Funding</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #fff; color: #111; line-height: 1.5;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        
        h1 { font-size: 1.8em; margin-bottom: 5px; }
        .subtitle { color: #666; margin-bottom: 20px; }
        
        .stats { display: flex; gap: 20px; margin: 20px 0; }
        .stat { background: #f5f5f5; padding: 15px 20px; flex: 1; text-align: center; }
        .stat-value { font-size: 1.5em; font-weight: 600; }
        .stat-label { font-size: 0.8em; color: #666; }
        
        .filters { margin: 20px 0; display: flex; gap: 10px; }
        .filters input, .filters select { 
            padding: 10px; border: 1px solid #ddd; font-size: 14px; 
        }
        .filters input { flex: 1; }
        
        .count { margin-bottom: 15px; color: #666; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f5f5f5; font-weight: 600; font-size: 0.85em; }
        tr:hover { background: #fafafa; }
        
        .amount { font-weight: 500; }
        .type { 
            background: #eee; padding: 3px 8px; font-size: 0.8em; 
            border-radius: 3px;
        }
        .industry { color: #666; font-size: 0.85em; }
        
        a { color: #0066cc; text-decoration: none; }
        a:hover { text-decoration: underline; }
        
        .footer { margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; color: #999; font-size: 0.85em; }
        
        @media (max-width: 600px) {
            .stats { flex-wrap: wrap; }
            .stat { min-width: 45%; }
            th, td { padding: 8px; font-size: 0.9em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Indian Tech Startups</h1>
        <p class="subtitle">Funding Database 2026</p>
        
        <div class="stats">
            <div class="stat"><div class="stat-value" id="count">0</div><div class="stat-label">Startups</div></div>
            <div class="stat"><div class="stat-value">$1.5B+</div><div class="stat-label">Total Funding</div></div>
            <div class="stat"><div class="stat-value">5</div><div class="stat-label">Unicorns</div></div>
        </div>
        
        <div class="filters">
            <input type="text" id="search" placeholder="Search..." oninput="filterTable()">
            <select id="stageFilter" onchange="filterTable()">
                <option value="">All Stages</option>
                <option value="Seed">Seed</option>
                <option value="Series A">Series A</option>
                <option value="Series B">Series B</option>
                <option value="Series C">Series C+</option>
            </select>
        </div>
        
        <div class="count">Showing <span id="visibleCount">0</span> startups</div>
        
        <table>
            <thead>
                <tr><th>#</th><th>Startup</th><th>Industry</th><th>Funding</th><th>Stage</th></tr>
            </thead>
            <tbody></tbody>
        </table>
        
        <div class="footer">Data from public sources</div>
    </div>

            {"name": "Swiggy", "website": "swiggy.com", "industry": "FoodTech", "amount": "$35,000,000", "funding_type": "Series D"}
        ];
        
        // Remove duplicates
        const uniqueStartups = [];
        const seen = new Set();
        startups.forEach(s => {
            if (!seen.has(s.name.toLowerCase())) {
                seen.add(s.name.toLowerCase());
                uniqueStartups.push(s);
            }
        });
        
        function renderTable() {
            const tbody = document.querySelector('tbody');
            tbody.innerHTML = '';
            uniqueStartups.forEach((s, i) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${i + 1}</td>
                    <td><a href="https://${s.website}" target="_blank">${s.name}</a></td>
                    <td class="industry">${s.industry}</td>
                    <td class="amount">${s.amount}</td>
                    <td><span class="type">${s.funding_type}</span></td>
                `;
                tbody.appendChild(row);
            });
            document.getElementById('count').textContent = uniqueStartups.length;
            document.getElementById('visibleCount').textContent = uniqueStartups.length;
        }
        
        function filterTable() {
            const search = document.getElementById('search').value.toLowerCase();
            const stage = document.getElementById('stageFilter').value;
            const rows = document.querySelectorAll('tbody tr');
            let visible = 0;
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                let stageMatch = !stage || text.includes(stage.toLowerCase());
                const show = stageMatch && (!search || text.includes(search));
                row.style.display = show ? '' : 'none';
                if (show) visible++;
            });
            document.getElementById('visibleCount').textContent = visible;
        }
        
        renderTable();
    </script>
</body>
</html>
