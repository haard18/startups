    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        
        :root {
            --bg: #0a0a0a;
            --card-bg: #111111;
            --text: #ffffff;
            --accent: #39ff14; /* Neon green */
            --accent2: #ff00ff; /* Neon pink */

            --border-pink: 3px solid #ff00ff;
        }
        
        @font-face {
            font-family: 'Tech';
            src: local('Courier New');
        }
        
        body { 
            font-family: 'Courier New', monospace;
            background: var(--bg); 
            color: var(--text); 
            line-height: 1.4;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(57, 255, 20, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 0, 255, 0.05) 0%, transparent 50%);
        }
        
        .container { 
            max-width: 1000px; 
            margin: 0 auto; 
            background: var(--card-bg);
            border: var(--border);
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.3);
            padding: 30px;
        }
        
        h1 { 
            font-size: 2.2em;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 3px;
            background: transparent;
            color: #ffffff;
            padding: 15px;
            border-left: 8px solid var(--accent);
        }
        
        h1 span {
            color: var(--accent);
        }
        
        h1 .pink {
            color: var(--accent2);
        }
        
        .subtitle { 
            font-size: 1em;
            font-weight: bold;
            margin-bottom: 20px;
            padding: 10px;
            background: transparent;
            border: var(--border-pink);
            display: inline-block;
            color: var(--accent2);
        }
        
        .stats { 
            display: flex; 
            gap: 15px; 
            margin: 25px 0;
            flex-wrap: wrap;
        }
        
        .stat { 
            background: #1a1a1a;
            padding: 20px;
            border: 2px solid #333;
            flex: 1;
            min-width: 140px;
            text-align: center;
            transition: all 0.3s;
        }
        
        .stat:hover {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.3);
        }
        
        .stat-value { 
            font-size: 1.8em; 
            font-weight: 900; 
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
        }
        
        .stat-label { 
            font-size: 0.75em; 
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 5px;
            color: #888;
        }
        
        .filters {
            margin: 20px 0; 
            display: flex; 
            gap: 10px; 
            flex-wrap: wrap;
        }
        
        .filters input, .filters select {
            padding: 12px 15px;
            border: 2px solid #333;
            background: #1a1a1a;
            color: #ffffff;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
        }
        
        .filters input { 
            flex: 1; 
            min-width: 200px; 
        }
        
        .filters input:focus, .filters select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.3);
        }
        
        .count {
            font-weight: bold;
            margin-bottom: 15px;
            padding: 12px;
            background: transparent;
            border-left: 4px solid var(--accent2);
            color: var(--accent2);
        }
        
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 20px;
            border: 2px solid #333;
        }
        
        th, td { 
            padding: 12px 15px; 
            text-align: left; 
            border-bottom: 1px solid #222;
        }
        
        th { 
            background: #1a1a1a;
            color: var(--accent); 
            font-weight: 900;
            text-transform: uppercase;
            font-size: 0.85em;
            border-bottom: 2px solid var(--accent);
        }
        
        tr:nth-child(even) { 
            background: #0f0f0f;
        }
        
        tr:hover { 
            background: rgba(57, 255, 20, 0.1);
        }
        
        .amount { 
            font-weight: 900; 
            color: var(--accent);
            text-shadow: 0 0 5px var(--accent);
        }
        
        .type { 
            background: transparent;
            color: var(--accent2);
            padding: 4px 10px;
            font-weight: bold;
            border: 2px solid var(--accent2);
            font-size: 0.8em;
            text-transform: uppercase;
        }
        
        .type.seed { border-color: #39ff14; color: #39ff14; }

        .type.series-b { border-color: #ff00ff; color: #ff00ff; }
        .type.pre-seed { border-color: #ffff00; color: #ffff00; }
        .type.series-c { border-color: #ff6b00; color: #ff6b00; }
        
        .industry {

        a {

        }

        }
    </style>

        function getTypeClass(type) {
            if (type.includes('Seed') || type.includes('Pre')) return 'seed';
            if (type.includes('Series A')) return 'series-a';
            if (type.includes('Series B')) return 'series-b';
            if (type.includes('Series C')) return 'series-c';
            return '';
        }
        
        function formatAmount(amount) {
            if (!amount) return 'N/A';
            return amount.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }
        
        function renderTable() {
            const tbody = document.querySelector('#startupTable tbody');
            tbody.innerHTML = '';
            
            uniqueStartups.forEach((s, i) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${i + 1}</td>
                    <td><a href="https://${s.website}" target="_blank">${s.name}</a></td>
                    <td class="industry">${s.industry}</td>
                    <td class="amount">${formatAmount(s.amount)}</td>
                    <td><span class="type ${getTypeClass(s.funding_type)}">${s.funding_type}</span></td>
                `;
                tbody.appendChild(row);
            });
            
            document.getElementById('count').textContent = uniqueStartups.length;
            document.getElementById('visibleCount').textContent = uniqueStartups.length;
        }
        
        function filterTable() {
            const search = document.getElementById('search').value.toLowerCase();
            const stage = document.getElementById('stageFilter').value;
            const rows = document.querySelectorAll('#startupTable tbody tr');
            let visible = 0;
            
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                let stageMatch = true;
                if (stage) {
                    if (stage === 'Series C') {
                        stageMatch = text.includes('series c') || text.includes('series d') || text.includes('series e') || text.includes('series f') || text.includes('series g') || text.includes('ipo');
                    } else {
                        stageMatch = text.includes(stage.toLowerCase());
                    }
                }
                const show = stageMatch && (!search || text.includes(search));
                row.style.display = show ? '' : 'none';
                if (show) visible++;
            });
            
            document.getElementById('visibleCount').textContent = visible;
        }
        
        renderTable();
